# ADR obligations — the structured shortlist of "what falls out of the ADRs".
#
# This is the first *feeder* per ADR-030 §8 (and ADR-029 dimension 4, "ADR
# commitments"): one row per load-bearing commitment an ADR makes, in
# structured data so a checker can bench reality against it and nothing gets
# logically lost. Benched by `tools/obligations_check.py` (prek-wired); see that
# file for exit codes. NOT loose prose — every row is machine-checked.
#
# The checker emits feeder-JSON per row for the future ADR-029 coverage joiner:
#   { "dimension": "adr-obligation", "obligation": <id>, "satisfied": <bool>,
#     "citation": <satisfied_by | tracking>, "exempt_until": <date|null> }
#
# Row schema:
#   id            unique slug
#   adr           "ADR-NNN" — must match a decisions/ADR-NNN-*.md file
#   statement     one line: the commitment, in plain language
#   kind          crate | gate | test | artifact | doc | ci | issue
#   status        satisfied | pending | exempt
#   satisfied_by  path or glob (string or list) — REQUIRED when status=satisfied;
#                 the checker fails if it doesn't resolve
#   tracking      where the open work lives — REQUIRED when status=pending
#   exempt_until  "YYYY-MM-DD" — REQUIRED when status=exempt; checker fails once past
#   exempt_reason why — REQUIRED when status=exempt
#
# Teeth: every in-force ADR (not in [meta].excluded) must have >=1 row, so a new
# ADR can't land without declaring what falls out of it.

[meta]
schema_version = 1
# In-force ADRs are checked for coverage; these are intentionally omitted, with why.
excluded = [
  { adr = "ADR-014", reason = "superseded by ADR-030 (TS SPA retired)" },
  { adr = "ADR-015", reason = "generalised by ADR-022 audit-log layer" },
]

