# ---- Contract engine (ADR-039) ------------------------------------------

[[obligation]]
id = "contract-canonical-form"
adr = "ADR-039"
statement = "One canonical contract form: collection-generic descriptors, the scalar set string|enum|integer|number|decimal|date|timestamp|bool|reference|attachment|object (no freeform json field), type != widget (a render block declares the widget); the meta-schema validates the shipped contract + a fixture instance in CI"
kind = "artifact"
status = "satisfied"
satisfied_by = ["crates/contract/tests/meta_schema.rs", "crates/contract/src/lib.rs", "schema/contract.schema.json", "schema/contract.example.json", "schema/presets/company.contract.json"]
tracking = "SATISFIED (M-A.1): canonical form + full scalar set + type≠widget in crates/contract; the CI meta-schema gate (crates/contract/tests/meta_schema.rs, run by the `test` flake check) validates BOTH the shipped qx-init preset AND the example fixture against schema/contract.schema.json AND the Rust SSOT; closed-facet parity (S1). The separate live registry-contract.json FE migration rides M-D and is not part of this obligation's terms"

[[obligation]]
id = "contract-ssot-validation"
adr = "ADR-039"
statement = "One Rust validation engine (pure crates/contract + crates/validators, wasm-clean: no fs/git2) is the SSOT; the FE calls it via wasm; parity is enforced by a (contract,record,verdict) conformance corpus run by three runners (native, wasm, FE Vitest on the shipped artifact)"
kind = "crate"
status = "pending"
tracking = "ADR-039 §3-4; one pure engine (crates/contract + crates/validators, wasm-clean) is the SSOT. Conformance corpus (conformance/, 27 cases) run by the NATIVE runner (crates/port_tests/tests/conformance.rs) + the wasm-clean build check + the wasm arm façade validate_record_json with native-logic tests (M-A.1 S3, crates/wasm). REMAINING: the FE Vitest runner executing the corpus through the shipped wasm (S4) to close native⇄wasm⇄FE parity"

[[obligation]]
id = "effective-dated-versioning"
adr = "ADR-039"
statement = "Effective-dating is commit-resolved (a record is governed by the contract content at its commit; merged records are never re-checked, so a tightening change cannot retroactively invalidate history); contract identity is its content hash (derived); governance — who/when/why/approved — is PROJECTED from the host review (PR reviews + merge commit), never stored in-file; the only in-file version is format_version (engine↔contract parse capability); required_to_enter (transition gate) is distinct from meaningful_from"
kind = "crate"
status = "pending"
tracking = "ADR-039 §6 (revised git-native after review, #204); commit-resolved effective-dating in the qx check gate (crates/cli) — only changed records re-validated, and UNTOUCHED records re-validated on a contract-shape change (M-A.1 S5 — reshaped_collections + e2e contract_tightening_revalidates_untouched_records); format_version compat range done (is_compatible). REMAINING: the content-hash export stamp (task #20)"

[[obligation]]
id = "preset-library-gate-floors"
adr = "ADR-040"
statement = "Presets are a declared library (schema/presets/*.contract.json), composed by qx init --preset a,b,c; the engine knows no collection by name. The non-weakenable floor is a declared marker + a gate no-weaken diff rule (gate run by hash, contract change CODEOWNERS-pinned), NOT compiled parts_descriptor(). parts becomes preset #1 and migrates into the library"
kind = "issue"
status = "pending"
tracking = "ADR-040 (Proposed). FIRST gate-enforcement landed (M-B): assert_parts_floor (crates/app/preset.rs) enforces the regulated parts LIFECYCLE floor (unbound→bound→void + initial) in qx check — proven by unit tests + e2e weakening_the_parts_lifecycle_floor_fails_the_gate. REMAINING (spike #216, keeps this Proposed): which FIELDS count as floor (deliberately undecided — narrowed away from an over-strict all-fields check), the non-instantiation / rename-around bypass, presets-as-declared-library composition, and retiring compiled parts_descriptor(). Refines/supersedes ADR-035 §0 guardrail #1 + ADR-039 §5"
