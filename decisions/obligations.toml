status = "pending"
tracking = "ADR-040 (Proposed). FIRST gate-enforcement landed (M-B): assert_parts_floor (crates/app/preset.rs) enforces the regulated parts LIFECYCLE floor (unbound→bound→void + initial) in qx check — proven by unit tests + e2e weakening_the_parts_lifecycle_floor_fails_the_gate. REMAINING (spike #216, keeps this Proposed): which FIELDS count as floor (deliberately undecided — narrowed away from an over-strict all-fields check), the non-instantiation / rename-around bypass, presets-as-declared-library composition, and retiring compiled parts_descriptor(). Refines/supersedes ADR-035 §0 guardrail #1 + ADR-039 §5"
