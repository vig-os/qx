# Pipeline-as-derivation (ADR-038 §4): every CI gate lives in
# `flake.nix` under `checks.<system>`. This workflow is the matrix
# shim — Nix on the runner, `nix flake check`, done. The same set of
# checks runs locally on a laptop (`nix flake check`) and on CI, so
# "green on my machine" is the same shape as "green in CI".
#
# Architecture matrix:
#   ubuntu-latest = x86_64-linux  (full set incl. web-e2e, release-binary)
#   macos-14      = aarch64-darwin (everything except the Linux-only checks)
#
# Branch trigger parity matches the old rust.yml / playwright.yml /
# flake-check.yml: PRs + pushes to main.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  flake-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    name: flake-check (${{ matrix.system }})
    # Guard: a hung step fails in ~90m, not at GitHub's 6h ceiling.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # magic-nix-cache-action removed: Determinate sunset the service
      # (Feb 2025); the action now stalls indefinitely on the macos-14
      # runner (6h timeout, nix flake check skipped) while passing on
      # linux. Correctness is unaffected — it was a cross-run cache only.
      # Follow-up: evaluate DeterminateSystems/flakehub-cache-action.
      - name: nix flake check
        env:
          PARTREG_TEST_PAT: ${{ secrets.PARTREG_TEST_PAT }}
        run: nix flake check -L --keep-going
