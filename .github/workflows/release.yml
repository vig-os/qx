# Tag-triggered release per #35 Phase 2 + ADR-025 distribution
# integrity. Produces a frontend bundle (web/ source + precompiled
# WASM artifacts) plus SHA-256 hashes, attached to a GitHub Release.
# Data repos consume the bundle from their own Pages workflows so they
# don't need a Rust toolchain on the runner.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on the repo)"
        required: true
        type: string

permissions:
  contents: write   # gh release create / upload

jobs:
  # Mirror of `rust.yml`'s gates — a release must pass the same bar
  # as a PR. We re-run them here (rather than relying on the tag
  # being pushed against a green commit) so the release artifact is
  # provably tied to a passing build, per ADR-025.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --exclude qx-desktop --all-targets -- -Dwarnings

      - name: cargo test
        run: cargo test --workspace --exclude qx-desktop

      - name: cargo build wasm32
        run: cargo build --target wasm32-unknown-unknown -p qx-wasm --release

      # `npm test` runs `build:wasm` which shells out to
      # `${WASM_BINDGEN:-$HOME/.cargo/bin/wasm-bindgen}`. Install the
      # prebuilt CLI so the test job has it on PATH. Same dance as in
      # the `bundle` job below + .github/workflows/playwright.yml.
      - name: Install wasm-bindgen-cli (prebuilt)
        run: |
          curl -sL https://github.com/rustwasm/wasm-bindgen/releases/download/0.2.121/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /tmp
          cp /tmp/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl/wasm-bindgen ~/.cargo/bin/
          chmod +x ~/.cargo/bin/wasm-bindgen

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      # Use `npm install` rather than `npm ci` — see comment in
      # `.github/workflows/playwright.yml` for the macOS-vs-Linux
      # lockfile drift rationale.
      - name: npm install
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: npm test
        working-directory: web
        run: npm test -- --run

  bundle:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing tag: ${tag}"

      - name: Install Rust toolchain
        run: rustup show

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # `cargo install wasm-bindgen-cli 0.2.121` requires rustc 1.86+,
      # but the workspace pins 1.85 (rust-toolchain.toml). cargo-binstall
      # downloads the official prebuilt 1.85-compatible binary instead
      # of recompiling. Same dance as .github/workflows/playwright.yml.
      - name: Install wasm-bindgen-cli (prebuilt)
        run: |
          curl -sL https://github.com/rustwasm/wasm-bindgen/releases/download/0.2.121/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /tmp
          cp /tmp/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl/wasm-bindgen ~/.cargo/bin/
          chmod +x ~/.cargo/bin/wasm-bindgen

      - name: Build WASM (release)
        run: cargo build --target wasm32-unknown-unknown -p qx-wasm --release

      - name: wasm-bindgen → web/src/wasm/
        run: |
          wasm-bindgen --target web \
            --out-dir web/src/wasm \
            --out-name qx_wasm \
            target/wasm32-unknown-unknown/release/qx_wasm.wasm

      - name: Stage bundle contents
        run: |
          mkdir -p staging
          # web/ source tree minus runtime artifacts.
          rsync -a \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='tsconfig.tsbuildinfo' \
            --exclude='.DS_Store' \
            --exclude='*.tsbuildinfo' \
            web/ staging/web/
          # Shared schema files referenced by `web/vite.config.ts` aliases
          # (@registry-contract, @deploy-config, @code-types).
          mkdir -p staging/schema
          cp schema/registry-contract.json staging/schema/
          cp schema/deploy-config.json staging/schema/
          cp schema/code-types.json staging/schema/
          # Bundle metadata: tag + commit SHA so the data-repo workflow
          # can record provenance in the deployed audit chain.
          cat > staging/BUNDLE_METADATA.json <<EOF
          {
            "tag": "${{ steps.tag.outputs.tag }}",
            "commit": "${GITHUB_SHA}",
            "code_repo": "${GITHUB_REPOSITORY}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Tar+gzip bundle
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          tar -czf "frontend-bundle-${TAG}.tar.gz" -C staging .

      - name: Compute SHA-256
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          sha256sum "frontend-bundle-${TAG}.tar.gz" > "sha256sums-${TAG}.txt"
          cat "sha256sums-${TAG}.txt"

      - name: Upload bundle as workflow artifact (debug aid)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle
          path: |
            frontend-bundle-*.tar.gz
            sha256sums-*.txt
          retention-days: 7

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # `release create --notes-file` reads body from a file. We
          # auto-generate a tiny note summarising what the consumer
          # needs to do; richer notes are added by hand or by a
          # release-notes generator in a future pass.
          cat > release-notes.md <<EOF
          ## Frontend bundle

          \`frontend-bundle-${TAG}.tar.gz\` contains:

          - \`web/\` — full FE source (TypeScript, Vite config, package.json + lock)
          - \`web/src/wasm/\` — precompiled wasm-bindgen artifacts (no Rust toolchain needed downstream)
          - \`schema/registry-contract.json\` — the shared schema contract
          - \`BUNDLE_METADATA.json\` — tag, commit SHA, build timestamp

          Consumer (data-repo pages.yml):

          \`\`\`yaml
          - run: gh release download ${TAG} --repo ${GITHUB_REPOSITORY} --pattern "frontend-bundle-*.tar.gz"
          - run: tar xzf frontend-bundle-${TAG}.tar.gz
          - run: cd web && npm install --no-audit --no-fund && VITE_DATA_REPO=<owner>/<repo> npm run build:fe
          \`\`\`

          SHA-256 hashes (per ADR-025 §"Distribution integrity"):

          \`\`\`
          $(cat sha256sums-${TAG}.txt)
          \`\`\`
          EOF

          # Idempotent: if the release already exists (e.g.
          # workflow_dispatch re-run), upload the assets with --clobber.
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG}" \
              "frontend-bundle-${TAG}.tar.gz" \
              "sha256sums-${TAG}.txt" \
              --repo "${GITHUB_REPOSITORY}" --clobber
          else
            # Create as a DRAFT: this repo has immutable releases on
            # (ADR-037 anchor-ledger tamper-evidence), and a PUBLISHED
            # release is sealed instantly — no later job could append the
            # gate binary + integrity evidence. So every job uploads to
            # the mutable draft; the terminal `publish` job flips
            # --draft=false once all assets are present, sealing
            # immutability WITH the full asset set.
            gh release create "${TAG}" \
              "frontend-bundle-${TAG}.tar.gz" \
              "sha256sums-${TAG}.txt" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --draft \
              --notes-file release-notes.md
          fi

  # The `qx` gate binary (ADR-030 §2 / ADR-034 §2) — the artifact a
  # deployed data-repo's CI pins + runs. Three properties make it the
  # audit-grade, vendorable gate:
  #   - MUSL-STATIC (x86_64-unknown-linux-musl): zero glibc coupling, runs
  #     on any Linux / scratch container — the ADR-038 vendored-gate carrier.
  #   - REPRODUCIBLE (ADR-024): pinned toolchain + path-remap +
  #     SOURCE_DATE_EPOCH, PROVEN by a byte-identical clean rebuild.
  #   - SIGNED + ATTESTED (ADR-025 distribution-integrity): keyless sigstore
  #     signature (OIDC, no stored key), SLSA build provenance, + SRI hash.
  qx-binary:
    needs: [test, bundle]
    runs-on: ubuntu-latest
    permissions:
      contents: write    # upload release assets
      id-token: write    # keyless cosign signing + attestation (OIDC)
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SOURCE_DATE_EPOCH from the commit timestamp

      - name: Install Rust toolchain
        run: rustup show

      - name: Install musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl C cross toolchain
        # ring / other cc-rs crates invoke the target-prefixed C compiler
        # x86_64-linux-musl-gcc; musl-tools ships musl-gcc — symlink it.
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          sudo ln -sf "$(command -v musl-gcc)" /usr/local/bin/x86_64-linux-musl-gcc

      - uses: Swatinem/rust-cache@v2

      - name: Determinism epoch
        id: repro
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Build qx (release, musl-static, reproducible)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.repro.outputs.epoch }}
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          export RUSTFLAGS="--remap-path-prefix=$PWD=. --remap-path-prefix=$HOME/.cargo=cargo"
          cargo build --release --target x86_64-unknown-linux-musl -p qx-cli --bin qx

      - name: Reproducibility proof (clean rebuild → byte-identical)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.repro.outputs.epoch }}
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          export RUSTFLAGS="--remap-path-prefix=$PWD=. --remap-path-prefix=$HOME/.cargo=cargo"
          BIN=target/x86_64-unknown-linux-musl/release/qx
          h1=$(sha256sum "$BIN" | cut -d' ' -f1)
          cargo clean -p qx-cli --release --target x86_64-unknown-linux-musl
          cargo build --release --target x86_64-unknown-linux-musl -p qx-cli --bin qx
          h2=$(sha256sum "$BIN" | cut -d' ' -f1)
          if [ "$h1" != "$h2" ]; then echo "::error::NON-REPRODUCIBLE: $h1 != $h2"; exit 1; fi
          echo "reproducible ✓ $h1"

      - name: Stage + checksum + SRI (ADR-025)
        run: |
          TAG="${{ needs.bundle.outputs.tag }}"
          cp target/x86_64-unknown-linux-musl/release/qx "qx-x86_64-unknown-linux-musl"
          sha256sum "qx-x86_64-unknown-linux-musl" > "qx-sha256sums-${TAG}.txt"
          echo "sha384-$(openssl dgst -sha384 -binary qx-x86_64-unknown-linux-musl | openssl base64 -A)" \
            > "qx-x86_64-unknown-linux-musl.sri"
          cat "qx-sha256sums-${TAG}.txt" "qx-x86_64-unknown-linux-musl.sri"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign gate binary (keyless — OIDC, no stored key; ADR-024)
        run: |
          cosign sign-blob --yes "qx-x86_64-unknown-linux-musl" \
            --output-signature "qx-x86_64-unknown-linux-musl.sig" \
            --output-certificate "qx-x86_64-unknown-linux-musl.pem"

      - name: SLSA build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "qx-x86_64-unknown-linux-musl"

      - name: Upload gate binary + integrity evidence to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bundle.outputs.tag }}"
          gh release upload "${TAG}" \
            "qx-x86_64-unknown-linux-musl" \
            "qx-sha256sums-${TAG}.txt" \
            "qx-x86_64-unknown-linux-musl.sri" \
            "qx-x86_64-unknown-linux-musl.sig" \
            "qx-x86_64-unknown-linux-musl.pem" \
            --repo "${GITHUB_REPOSITORY}" --clobber

      # ADR-038 §5: the curl-able install.sh pins this tarball by its
      # released sha256 — registry setup runs release-verified code,
      # never whatever happens to be on main. Signed too.
      - name: Bootstrap tarball (install.sh pin target; signed)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bundle.outputs.tag }}"
          tar -czf "bootstrap-${TAG}.tar.gz" install.sh tools/bootstrap-data-repo.sh tools/data-repo-templates
          sha256sum "bootstrap-${TAG}.tar.gz" > "bootstrap-${TAG}.tar.gz.sha256"
          cosign sign-blob --yes "bootstrap-${TAG}.tar.gz" \
            --output-signature "bootstrap-${TAG}.tar.gz.sig" \
            --output-certificate "bootstrap-${TAG}.tar.gz.pem"
          gh release upload "${TAG}" \
            "bootstrap-${TAG}.tar.gz" \
            "bootstrap-${TAG}.tar.gz.sha256" \
            "bootstrap-${TAG}.tar.gz.sig" \
            "bootstrap-${TAG}.tar.gz.pem" \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # ADR-038 §4: the runner image — data repos (and operators, via
  # podman) run the deep suite in the SAME pinned environment as CI,
  # so environment drift dies. Built from the released gate binary;
  # moves to a flake dockerTools build when the gate build goes
  # in-flake (the image then becomes bit-reproducible too).
  runner-image:
    needs: [bundle, qx-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Fetch released gate binary (by pin, like a data repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bundle.outputs.tag }}"
          gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" \
            --pattern "qx-x86_64-unknown-linux-musl" \
            --pattern "qx-sha256sums-*.txt"
          grep "qx-x86_64-unknown-linux-musl" "qx-sha256sums-${TAG}.txt" | sha256sum -c -

      - name: Build + push runner image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bundle.outputs.tag }}"
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}-runner"
          cp qx-x86_64-unknown-linux-musl qx
          cat > Dockerfile <<'DOCKER'
          FROM debian:bookworm-slim
          RUN apt-get update \
            && apt-get install -y --no-install-recommends git ca-certificates jq zstd curl \
            && rm -rf /var/lib/apt/lists/*
          COPY qx /usr/local/bin/qx
          RUN chmod +x /usr/local/bin/qx
          ENTRYPOINT ["/usr/local/bin/qx"]
          DOCKER
          echo "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  # Terminal seal: flip the draft to a published (immutable) release once
  # every audit-critical asset is present. Gated on the asset PRODUCERS
  # only (bundle + qx-binary) — runner-image merely CONSUMES the released
  # binary, so a transient ghcr flake there must not leave the release an
  # unconsumable draft. Publishing here is the moment ADR-037 immutability
  # seals the gate binary + its signature/SRI/provenance against tamper.
  publish:
    needs: [bundle, qx-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release (seal immutability with all assets present)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bundle.outputs.tag }}"
          gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --draft=false
          echo "published ${TAG} (immutable seal) with assets:"
          gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name'
