# Per #35 Phase 3 — headless Playwright e2e against the production
# Vite build. Mirrors `rust.yml`'s shape: PRs + pushes to main run the
# same gate.
name: playwright

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # `cargo install wasm-bindgen-cli 0.2.121` requires rustc 1.86+,
      # but the workspace pins 1.85 (rust-toolchain.toml). cargo-binstall
      # downloads the official prebuilt 1.85-compatible binary instead
      # of recompiling. Tracked as a follow-up: bump MSRV past 1.86 and
      # this dance goes away.
      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm-bindgen-cli (prebuilt)
        # `--force` because Swatinem/rust-cache restores the cargo
        # `install.crates2.json` metadata file but NOT the binaries
        # themselves; without --force, binstall says "already
        # installed" and the wasm-bindgen executable isn't on PATH.
        run: cargo binstall --force --no-confirm wasm-bindgen-cli@0.2.121

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      # `npm ci` is the strict-lockfile variant; we use `npm install`
      # because the lockfile is generated on macOS (Node 24 / npm 11)
      # and CI runs on Linux (Node 22 / npm 10), which causes platform-
      # specific optional deps (@emnapi/*, esbuild's Linux build) to
      # disagree between the two. Reproducibility is preserved at the
      # release-bundle level (we publish the resolved node_modules
      # implicitly in the consumer's lockfile inside the bundle). To
      # re-enable strict ci, regenerate the lockfile inside the flake
      # shell (Node 22) before merging future dep bumps.
      - name: npm install
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: web
        run: npm run e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7
