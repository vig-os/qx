# Per #35 Phase 3 — headless Playwright e2e against the production
# Vite build. Mirrors `rust.yml`'s shape: PRs + pushes to main run the
# same gate.
name: playwright

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # Direct download of wasm-bindgen prebuilt binary — avoids
      # cargo-binstall's GH API rate limits and the rustc 1.86+
      # requirement of `cargo install wasm-bindgen-cli@0.2.121`.
      - name: Install wasm-bindgen-cli (prebuilt)
        run: |
          curl -sL https://github.com/rustwasm/wasm-bindgen/releases/download/0.2.121/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /tmp
          cp /tmp/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl/wasm-bindgen ~/.cargo/bin/
          chmod +x ~/.cargo/bin/wasm-bindgen

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      # `npm ci` is the strict-lockfile variant; we use `npm install`
      # because the lockfile is generated on macOS (Node 24 / npm 11)
      # and CI runs on Linux (Node 22 / npm 10), which causes platform-
      # specific optional deps (@emnapi/*, esbuild's Linux build) to
      # disagree between the two. Reproducibility is preserved at the
      # release-bundle level (we publish the resolved node_modules
      # implicitly in the consumer's lockfile inside the bundle). To
      # re-enable strict ci, regenerate the lockfile inside the flake
      # shell (Node 22) before merging future dep bumps.
      - name: npm install
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        working-directory: web
        run: npm run e2e
        env:
          PARTREG_TEST_PAT: ${{ secrets.PARTREG_TEST_PAT }}

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7
