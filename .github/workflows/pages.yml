# Per #35: this workflow stays as a code-repo preview deploy so the
# vanilla FE bundle (sandbox-default registry) is available at
# https://morepet.github.io/part-registry/. Production deployments live
# on the data repos (exo-pet/exopet-registry[-sandbox]) and consume
# released bundles from this repo per Phase 2's release.yml.
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm-bindgen-cli (prebuilt)
        run: cargo binstall --force --no-confirm wasm-bindgen-cli@0.2.121

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      # See `.github/workflows/playwright.yml` for the npm install
      # vs npm ci rationale (macOS-vs-Linux lockfile drift).
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          VITE_BASE: /part-registry/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
