# DEPRECATED 2026-06-30 — auto-deploy DISABLED (manual-only).
#
# The serverless GitHub Pages target is dropped (ADR-013 superseded by
# ADR-030). It was only a read-only preview: serverless WASM can't do
# device-flow write auth, so it never carried the real app. The FE deploy
# story is now the local-first shells per ADR-030 §"three deploy targets":
#   - `qx serve` — static bundle + JSON command API over localhost/remote,
#     with full read+write via the credential resolver; reach a phone over
#     the tailnet with `tailscale serve` (proven with the dual-engine bench).
#   - Tauri v2 — native desktop/mobile (desktop/src-tauri/).
# Kept manual-only (workflow_dispatch) for one-off public read demos; remove
# entirely once nothing references it. NOTE: VITE_BASE below still says
# /part-registry/ — irrelevant while auto-deploy is off.
name: Deploy web to GitHub Pages (DEPRECATED — manual-only)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main
      - name: Install wasm-bindgen-cli (prebuilt)
        run: cargo binstall --force --no-confirm wasm-bindgen-cli@0.2.121

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      # See `.github/workflows/playwright.yml` for the npm install
      # vs npm ci rationale (macOS-vs-Linux lockfile drift).
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          VITE_BASE: /part-registry/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
