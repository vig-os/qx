# SOUP inventory per ADR-028 + IEC 62304 §5.3.2 (Software of Unknown
# Provenance identification).
#
# Every workspace dependency declared in `Cargo.toml` (and per-crate
# manifests) gets an entry below. Class scheme per ADR-028 §3:
#   Class 1 = battle-tested foundational; pin + inventory only
#   Class 2 = specialized/mature; targeted feature-use test +
#             maintenance signal
#   Class 3 = directly affects safety-relevant property; full
#             ADR-027 Tier 5 validation harness + named owner
#
# Schema version 1. Edited by humans; consumed by ADR-029 coverage
# tool. Adding a workspace dep without an entry here is a CI failure
# once the coverage tool lands.
#
# Source: ADR-028, SOUP audit report 2026-05-11 (agent a909e6ce).

schema_version = 1
last_full_review = "2026-05-15"

