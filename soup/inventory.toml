Less battle-tested than zxing-cpp / zxing-wasm per ADR-017 §Consequences.
Planned H4 harness (issue #46 extension, deferred) compares rxing
Micro QR decode against zxing-wasm on a real-world photo corpus from
bootstrap batch B-2026-05-08-sheet-1. Tier 5 cross-decoder agreement
already covered by H2 on synthetic corpus.
"""

[[crate]]
name = "reqwest"
version = "=0.12"
class = 3
role = "HTTPS to GitHub API for identity (OAuth) + transport (PR creation)"
used_by = ["identity_github_oauth", "transport_github_pr"]
maintenance_url = "https://github.com/seanmonstar/reqwest"
last_release_check = "2026-05-11"
upstream_status = "active"
validation_harness = "crates/port_tests/src/soup/oauth_tls.rs"
surveillance_owner = "identity-and-transport-maintainer"
revalidation_trigger = "any-version-bump"
notes = """
Configured with `rustls-tls` + `blocking` + `json`, NO `native-tls`
per ADR-024 §Reproducible builds (no OS-conditional binaries) and
ADR-028 SOUP audit guidance. TLS-stack changes are
release-blocking: any switch back to native-tls re-opens this entry
and re-runs H6 from scratch. Identity provenance + proposal
submission both ride this; a TLS misconfiguration silently
accepting a bad cert is the highest-risk failure mode.
"""

