# Workspace-level cargo settings. Per ADR-024 §Reproducible builds the
# release profile (defined in Cargo.toml) sets codegen-units=1 + lto=fat;
# CI additionally injects RUSTFLAGS for path remapping.

[build]
target-dir = "target"

