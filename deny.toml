# cargo-deny — dependency licenses + RUSTSEC advisories (wired in .pre-commit-config.yaml).
# Starter baseline: a permissive allow-list of common OSI licenses, multiple-versions tolerated
# (large graphs are noisy), advisories deny-by-default with an explicit, auditable `ignore` list.
# This workspace's crates are `publish = false`, so `private.ignore` skips license-gating them.

[advisories]
version = 2
yanked = "warn"
ignore = [
  # time 0.3.x < 0.3.47: DoS via stack exhaustion when parsing
  # *untrusted RFC-2822* input. This workspace parses/formats RFC-3339
  # only (well_known::Rfc3339 at every call site) — the vulnerable code
  # path is unreachable. The patched 0.3.47 requires Rust 1.88; our
  # toolchain is pinned 1.85 (ADR-024 repro-build discipline). Retire
  # this ignore with the toolchain bump (obligations: `toolchain-bump-188`).
  "RUSTSEC-2026-0009",
  # paste 1.x: unmaintained (archived upstream). Transitive dev-only
  # dep (imageproc -> nalgebra -> simba) used by the codec test raster
  # helper — not in any shipped artifact. Revisit when imageproc moves
  # off it or if it enters a non-dev dependency path.
  "RUSTSEC-2024-0436",
]

[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }   # don't license-gate first-party (publish=false) crates
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "0BSD",
  "BSL-1.0",
  # University of Illinois/NCSA — permissive, OSI-approved (appears
  # AND-combined with MIT/Apache in the rustls/reqwest dep tree).
  "NCSA",
  # Community Data License Agreement Permissive 2.0 — webpki-roots'
  # Mozilla root-certificate database (reqwest rustls-tls).
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
