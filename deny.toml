# cargo-deny — dependency licenses + RUSTSEC advisories (wired in .pre-commit-config.yaml).
# Starter baseline: a permissive allow-list of common OSI licenses, multiple-versions tolerated
# (large graphs are noisy), advisories deny-by-default with an explicit, auditable `ignore` list.
# This workspace's crates are `publish = false`, so `private.ignore` skips license-gating them.

[advisories]
version = 2
yanked = "warn"
ignore = []   # add RUSTSEC-IDs here with a comment when you accept a transitive advisory

[licenses]
version = 2
confidence-threshold = 0.8
private = { ignore = true }   # don't license-gate first-party (publish=false) crates
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "0BSD",
  "BSL-1.0",
]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "allow"
